<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-2: #eef3fb;
            --text: #111827;
            --muted: #667085;
            --accent: #0f766e;
            --accent-2: #0891b2;
            --danger: #dc2626;
            --ring: rgba(15,118,110,.15);
            --shadow: 0 18px 45px rgba(2, 6, 23, .10);
            --radius: 18px;
        }

        body.theme-dark {
            --bg: #0b1220;
            --surface: #111a2c;
            --surface-2: #0f172a;
            --text: #e2e8f0;
            --muted: #9aa9bf;
            --accent: #22c55e;
            --accent-2: #06b6d4;
            --danger: #f87171;
            --ring: rgba(34,197,94,.18);
            --shadow: 0 18px 45px rgba(0, 0, 0, .35);
        }

        html, body { min-height: 100%; }
        body {
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 10%, rgba(14,165,233,.16), transparent 28%),
                radial-gradient(circle at 88% 8%, rgba(45,212,191,.18), transparent 30%),
                linear-gradient(165deg, var(--bg) 0%, var(--surface-2) 100%);
            transition: background .25s ease, color .25s ease;
        }

        .app-shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 16px 80px;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            gap: 12px;
        }

        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #fff;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 600;
            letter-spacing: .2px;
            box-shadow: var(--shadow);
        }

        .surface-card {
            background: color-mix(in srgb, var(--surface) 90%, transparent);
            border: 1px solid color-mix(in srgb, var(--text) 8%, transparent);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            backdrop-filter: blur(6px);
        }

        .auth-wrap {
            min-height: calc(100vh - 80px);
            display: grid;
            place-items: center;
            padding: 24px 0;
        }

        .auth-card { width: min(540px, 95vw); }

        .form-control, .form-select {
            border-radius: 12px;
            border-color: color-mix(in srgb, var(--text) 15%, transparent);
            background-color: color-mix(in srgb, var(--surface) 94%, transparent);
            color: var(--text);
            padding-top: .62rem;
            padding-bottom: .62rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 .22rem var(--ring);
            background-color: var(--surface);
            color: var(--text);
        }

        .btn-modern {
            border: none;
            border-radius: 12px;
            padding: .65rem .95rem;
            font-weight: 600;
            letter-spacing: .2px;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #fff;
        }
        .btn-modern:hover { filter: brightness(1.05); color: #fff; }

        .btn-soft {
            border-radius: 12px;
            border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
            background: color-mix(in srgb, var(--surface) 82%, transparent);
            color: var(--text);
        }

        .table-modern {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text);
            --bs-table-hover-color: var(--text);
            --bs-table-hover-bg: color-mix(in srgb, var(--accent) 10%, transparent);
            border-color: color-mix(in srgb, var(--text) 14%, transparent);
        }

        .table-modern thead th {
            background: color-mix(in srgb, var(--accent) 16%, transparent);
            color: var(--text);
            border-bottom: none;
            white-space: nowrap;
        }

        .muted { color: var(--muted); }

        #themeToggle {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 1050;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
            background: color-mix(in srgb, var(--surface) 90%, transparent);
            color: var(--text);
            font-weight: 600;
            padding: 8px 14px;
        }

        .input-group .btn { border-radius: 0 12px 12px 0 !important; }

        a { color: var(--accent-2); }
        a:hover { color: var(--accent); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-shell">
        {% block body %}{% endblock %}
    </div>

    <button id="themeToggle" type="button">Dark Mode</button>
    <script>
    (function () {
        const storageKey = 'theme_pref';
        const body = document.body;
        const toggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('theme-dark');
                toggle.textContent = 'Light Mode';
            } else {
                body.classList.remove('theme-dark');
                toggle.textContent = 'Dark Mode';
            }
        }

        const saved = localStorage.getItem(storageKey) || 'light';
        applyTheme(saved);

        toggle.addEventListener('click', function () {
            const next = body.classList.contains('theme-dark') ? 'light' : 'dark';
            localStorage.setItem(storageKey, next);
            applyTheme(next);
        });
    })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
