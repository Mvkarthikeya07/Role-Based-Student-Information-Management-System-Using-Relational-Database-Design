<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="width: 400px;">
            <h3 class="text-center mb-3">Reset Password</h3>
            
            {% if success %}
                <div class="alert alert-success text-center">
                    <strong>Success!</strong><br>
                    Your password has been reset successfully.
                </div>
                <a href="{{ url_for('login') }}" class="btn btn-primary w-100">Go to Login</a>
            {% elif error %}
                <div class="alert alert-danger">{{ error }}</div>
                <a href="{{ url_for('forgot_password') }}" class="btn btn-secondary w-100">Request New Reset Link</a>
            {% else %}
                <p class="text-muted mb-3">Enter your new password below.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                    </div>
                    <button class="btn btn-primary w-100">Reset Password</button>
                </form>
                <a href="{{ url_for('login') }}" class="btn btn-secondary w-100 mt-2">Back to Login</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
